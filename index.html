// ─── API calls (CORS-safe) ────────────────────
async function getQ(t){
  try{
    const r=await fetch(`https://finnhub.io/api/v1/quote?symbol=${t}&token=${FINNHUB_KEY}`);
    const d=await r.json();
    if(!d||!d.c||d.c===0)return null;
    return{price:d.c.toFixed(2),change:((d.c-d.pc)/d.pc*100).toFixed(2),high:d.h.toFixed(2),low:d.l.toFixed(2),prev:d.pc.toFixed(2),ok:true};
  }catch{return null;}
}

async function getNews(t){
  try{
    const to=new Date().toISOString().slice(0,10);
    const from=new Date(Date.now()-3*864e5).toISOString().slice(0,10);
    const r=await fetch(`https://finnhub.io/api/v1/company-news?symbol=${t}&from=${from}&to=${to}&token=${FINNHUB_KEY}`);
    const d=await r.json();
    if(!Array.isArray(d)||!d.length)return[];
    return d.slice(0,4).map(n=>({h:n.headline,src:n.source,url:n.url,dt:new Date(n.datetime*1000).toLocaleDateString("th-TH")}));
  }catch{return[];}
}

async function getRec(t){
  try{
    const r=await fetch(`https://finnhub.io/api/v1/stock/recommendation?symbol=${t}&token=${FINNHUB_KEY}`);
    const d=await r.json();
    return Array.isArray(d)&&d.length?d[0]:null;
  }catch{return null;}
}

async function getEarnings(){
  try{
    const from=new Date().toISOString().slice(0,10);
    const to=new Date(Date.now()+45*864e5).toISOString().slice(0,10);
    const r=await fetch(`https://finnhub.io/api/v1/calendar/earnings?from=${from}&to=${to}&token=${FINNHUB_KEY}`);
    const d=await r.json();
    return(d.earningsCalendar||[]).filter(e=>e.symbol&&e.date).slice(0,40);
  }catch{return[];}
}

// ─── Groq AI — 3 proxy fallbacks ─────────────
async function callAI(prompt){
  if(!GROQ_KEY){
    return{confidence:45,signal:"Neutral",catalyst:"ไม่มี Groq key",strategy:"ใส่ GROQ_KEY ใน index.html",headline:"⚠️ กรุณาใส่ Groq API key (ฟรี) ที่ console.groq.com",interesting:false};
  }

  const body=JSON.stringify({
    model:"llama3-8b-8192",
    max_tokens:300,
    temperature:0.2,
    messages:[
      {role:"system",content:"You are an expert options trader. Reply ONLY with valid JSON, no markdown, no extra text."},
      {role:"user",content:prompt}
    ]
  });

  const headers={"Content-Type":"application/json","Authorization":`Bearer ${GROQ_KEY}`};

  // Try 1: Direct (works when opened as file://)
  try{
    const r=await fetch("https://api.groq.com/openai/v1/chat/completions",{method:"POST",headers,body});
    if(r.ok){
      const d=await r.json();
      const txt=d.choices?.[0]?.message?.content||"{}";
      return JSON.parse(txt.replace(/```json|```/g,"").trim());
    }
  }catch{}

  // Try 2: allorigins proxy
  try{
    const target=encodeURIComponent("https://api.groq.com/openai/v1/chat/completions");
    const r=await fetch(`https://api.allorigins.win/raw?url=${target}`,{method:"POST",headers:{...headers,"X-Requested-With":"XMLHttpRequest"},body});
    if(r.ok){
      const d=await r.json();
      const txt=d.choices?.[0]?.message?.content||"{}";
      return JSON.parse(txt.replace(/```json|```/g,"").trim());
    }
  }catch{}

  // Try 3: corsproxy.io
  try{
    const r=await fetch("https://corsproxy.io/?https://api.groq.com/openai/v1/chat/completions",{method:"POST",headers,body});
    if(r.ok){
      const d=await r.json();
      const txt=d.choices?.[0]?.message?.content||"{}";
      return JSON.parse(txt.replace(/```json|```/g,"").trim());
    }
  }catch{}

  // Try 4: cors-anywhere (ถ้าเคยขอ access แล้ว)
  try{
    const r=await fetch("https://cors-anywhere.herokuapp.com/https://api.groq.com/openai/v1/chat/completions",{method:"POST",headers:{...headers,"X-Requested-With":"XMLHttpRequest"},body});
    if(r.ok){
      const d=await r.json();
      const txt=d.choices?.[0]?.message?.content||"{}";
      return JSON.parse(txt.replace(/```json|```/g,"").trim());
    }
  }catch{}

  return null;
}

          </div>
        </div>
        <div className="card" style={{background:"#fff",borderRadius:12,border:"1px solid #e5e7eb",padding:16}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <div style={{fontSize:14,fontWeight:700}}>🤖 AI Macro — {macroAsset==="gold"?"Gold / GLD":"Bitcoin / IBIT"}</div>
            <button onClick={runMacroAI} disabled={macroAILoad} style={{padding:"7px 16px",fontSize:12,fontWeight:700,borderRadius:8,border:`1px solid ${macroAsset==="gold"?CLR.amber[1]:CLR.purple[1]}`,background:macroAsset==="gold"?CLR.amber[0]:CLR.purple[0],color:macroAsset==="gold"?CLR.amber[1]:CLR.purple[1],cursor:"pointer",opacity:macroAILoad?0.6:1}}>
              {macroAILoad?"กำลังวิเคราะห์...":"Run AI Macro →"}
            </button>
          </div>
          {macroAI?<div style={{fontSize:13,lineHeight:1.9,whiteSpace:"pre-wrap"}}>{macroAI}</div>:<div style={{fontSize:12,color:"#9ca3af",fontStyle:"italic"}}>กด Run AI Macro เพื่อวิเคราะห์สถานะ macro และแนะนำ options strategy</div>}
        </div>
      </div>)}

      {/* ══ IV SCANNER ══ */}
      {tab==="scanner"&&(<div>
        <div style={{fontSize:12,color:"#6b7280",marginBottom:12}}>ราคาจาก Finnhub Live · IV Rank เป็นค่าประมาณ · คลิก ticker เพื่อค้นหาและดูข่าว</div>
        <div className="card" style={{background:"#fff",borderRadius:12,border:"1px solid #e5e7eb",overflow:"hidden"}}>
          <div style={{display:"grid",gridTemplateColumns:"80px 65px 80px 1fr 70px 70px",gap:5,padding:"7px 12px",fontSize:10,color:"#9ca3af",borderBottom:"1px solid #f3f4f6",fontWeight:700,background:"#f9fafb"}}>
            <span>Ticker</span><span>ราคา</span><span>Sector</span><span>IV Rank</span><span>P/C</span><span>Bias</span>
          </div>
          {Object.keys(IV_MAP).map(t=>{
            const q=quotes[t];const iv=IV_MAP[t];
            const pcr=t==="BA"?0.88:t==="NKE"?0.61:t==="TSLA"?0.91:t==="IBIT"?0.69:t==="GLD"?0.88:t==="NVDA"?0.64:0.80;
            const bias=iv.r>=65?"Bullish":iv.r<=35?"Neutral":"Moderate";
            return(<div key={t} onClick={()=>{setSq(t);setTab("alpha");setTimeout(()=>inputRef.current?.focus(),100);}}
              style={{display:"grid",gridTemplateColumns:"80px 65px 80px 1fr 70px 70px",gap:5,padding:"8px 12px",borderBottom:"1px solid #f3f4f6",cursor:"pointer"}} className="card">
              <div style={{fontWeight:700,fontSize:13}}>{t}</div>
              <div style={{fontSize:12,color:q?parseFloat(q.change)>=0?"#3B6D11":"#A32D2D":"#9ca3af"}}>{q?`$${q.price}`:"—"}</div>
              <div><span style={{background:["GLD","IBIT"].includes(t)?"#FAEEDA":"#F1EFE8",color:["GLD","IBIT"].includes(t)?"#854F0B":"#5F5E5A",fontSize:10,padding:"1px 6px",borderRadius:5,fontWeight:600}}>{SECTOR[t]}</span></div>
              <div><div style={{fontSize:10,color:"#9ca3af",marginBottom:2}}>rank {iv.r} · {iv.iv}% IV</div><IVBar v={iv.r}/></div>
              <div style={{fontSize:13,fontWeight:700,color:pcr>1?"#A32D2D":pcr<0.75?"#3B6D11":"#854F0B"}}>{pcr}</div>
              <div><span style={{background:iv.r>=65?"#EAF3DE":"#F1EFE8",color:iv.r>=65?"#3B6D11":"#5F5E5A",fontSize:11,padding:"1px 7px",borderRadius:5,fontWeight:600}}>{bias}</span></div>
            </div>);
          })}
        </div>
      </div>)}

      {/* ══ FLOW ALERTS ══ */}
      {tab==="flow"&&(<div>
        <div style={{fontSize:12,color:"#6b7280",marginBottom:10}}>Smart money flow — Vol/OI &gt;3× · Institutional activity alerts</div>
        <div style={{display:"flex",gap:5,marginBottom:12}}>
          {[["all","ทั้งหมด"],["calls","Calls"],["puts","Puts"]].map(([v,l])=>(
            <button key={v} onClick={()=>setFlowFilter(v)} style={{fontSize:11,padding:"4px 12px",borderRadius:20,border:"1px solid #e5e7eb",cursor:"pointer",background:flowFilter===v?"#FAEEDA":"#f9fafb",color:flowFilter===v?"#854F0B":"#6b7280",fontWeight:flowFilter===v?700:400}}>{l}</button>
          ))}
        </div>
        <div className="card" style={{background:"#fff",borderRadius:12,border:"1px solid #e5e7eb",overflow:"hidden"}}>
          <div style={{display:"grid",gridTemplateColumns:"65px 50px 60px 50px 1fr 60px 70px 1fr",gap:5,padding:"7px 12px",fontSize:10,color:"#9ca3af",borderBottom:"1px solid #f3f4f6",fontWeight:700,background:"#f9fafb"}}>
            <span>Ticker</span><span>Type</span><span>Strike</span><span>Expiry</span><span>Volume</span><span>OI</span><span>Vol/OI</span><span>Signal</span>
          </div>
          {flowShown.map((r,i)=>(
            <div key={i} style={{display:"grid",gridTemplateColumns:"65px 50px 60px 50px 1fr 60px 70px 1fr",gap:5,padding:"9px 12px",borderBottom:"1px solid #f3f4f6",alignItems:"center"}} className="card">
              <div style={{fontWeight:700,fontSize:13}}>{r.t}</div>
              <Bdg c={r.type==="Call"?"green":"red"} ch={r.type}/>
              <div style={{fontSize:12,fontWeight:700}}>${r.strike}</div>
              <div style={{fontSize:11,color:"#9ca3af"}}>{r.exp}</div>
              <div><div style={{fontSize:12,fontWeight:700}}>{fmt(r.vol)}</div><div style={{fontSize:10,color:"#9ca3af"}}>prem ${r.prem}</div></div>
              <div style={{fontSize:12}}>{fmt(r.oi)}</div>
              <div><div style={{fontSize:12,fontWeight:700,color:r.ratio>=5?"#A32D2D":"#854F0B"}}>{r.ratio}×</div><div style={{height:4,background:"#F1EFE8",borderRadius:2,marginTop:3,overflow:"hidden"}}><div style={{width:`${Math.min(100,r.ratio/12*100)}%`,height:"100%",background:r.ratio>=5?"#A32D2D":"#854F0B",borderRadius:2}}/></div></div>
              <div style={{fontSize:11,fontWeight:600,color:r.flag.includes("Bullish")||r.flag.includes("breakout")||r.flag.includes("momentum")||r.flag.includes("accumulation")||r.flag.includes("upgrade")?"#3B6D11":r.flag.includes("Bearish")||r.flag.includes("hedge")?"#A32D2D":"#854F0B",lineHeight:1.4}}>{r.flag}</div>
            </div>
          ))}
        </div>
      </div>)}

      {/* ══ STRATEGY ══ */}
      {tab==="strategy"&&(<div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14}}>
          <div>
            <div style={{fontSize:12,fontWeight:700,marginBottom:6,color:"#6b7280"}}>เลือก Ticker</div>
            <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
              {["NKE","SOFI","OXY","PYPL","BA","LLY","GLD","IBIT","NVDA","TSLA","SPY","AMD"].map(t=>(
                <button key={t} onClick={()=>setStratT(t)} style={{fontSize:12,padding:"5px 11px",borderRadius:16,border:"1px solid #e5e7eb",cursor:"pointer",background:stratT===t?"#EEEDFE":"#f9fafb",color:stratT===t?"#3C3489":"#6b7280",fontWeight:stratT===t?700:400}}>{t}</button>
              ))}
            </div>
          </div>
          <div>
            <div style={{fontSize:12,fontWeight:700,marginBottom:6,color:"#6b7280"}}>เลือก Strategy</div>
            <select value={stratN} onChange={e=>setStratN(e.target.value)} className="inp" style={{width:"100%",fontSize:13,padding:"8px 12px",borderRadius:8,border:"1px solid #d1d5db",background:"#f9fafb",cursor:"pointer"}}>
              {Object.keys(STRATEGIES).map(s=><option key={s} value={s}>{s}</option>)}
            </select>
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:14}}>
          {Object.entries(STRATEGIES).map(([name,s])=>(
            <div key={name} onClick={()=>setStratN(name)} className="card" style={{border:stratN===name?`2px solid ${CLR[s.color][1]}`:"1px solid #e5e7eb",borderRadius:10,padding:"10px 12px",cursor:"pointer",background:"#fff"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:5}}>
                <div style={{fontSize:12,fontWeight:700}}>{name}</div><Bdg c={s.color} ch={s.bias}/>
              </div>
              <PayoffChart shape={s.payoff} color={s.color}/>
              <div style={{fontSize:10,color:"#9ca3af",marginTop:4}}>{s.iv}</div>
            </div>
          ))}
        </div>
        <div className="card" style={{background:"#fff",border:`1px solid ${CLR[strat.color][1]}`,borderRadius:12,padding:16}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
            <div><div style={{fontSize:15,fontWeight:700}}>{stratN} on {stratT}</div><div style={{fontSize:12,color:"#9ca3af",marginTop:2}}>ราคา: {sq2?`$${sq2.price} (${sq2.change}%)`:"loading..."} · IV Rank: {siv?.r||"—"}/100</div></div>
            <button onClick={runStratAI} disabled={stratAILoad} style={{padding:"8px 16px",fontSize:12,fontWeight:700,borderRadius:8,border:`1px solid ${CLR[strat.color][1]}`,background:CLR[strat.color][0],color:CLR[strat.color][1],cursor:"pointer",opacity:stratAILoad?0.6:1}}>
              {stratAILoad?"กำลังวิเคราะห์...":"🤖 AI Evaluate →"}
            </button>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:12}}>
            <div><div style={{fontSize:11,fontWeight:700,marginBottom:7,color:"#6b7280"}}>Strategy Legs</div>{strat.legs.map((l,i)=>(<div key={i} style={{display:"flex",gap:7,alignItems:"flex-start",marginBottom:6}}><div style={{width:18,height:18,borderRadius:"50%",background:CLR[strat.color][0],display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><span style={{fontSize:10,fontWeight:700,color:CLR[strat.color][1]}}>{i+1}</span></div><div style={{fontSize:13,lineHeight:1.5}}>{l}</div></div>))}</div>
            <div><div style={{fontSize:11,fontWeight:700,marginBottom:7,color:"#6b7280"}}>เมื่อไหร่ควรใช้</div><div style={{fontSize:13,lineHeight:1.7,marginBottom:8}}>{strat.when}</div></div>
          </div>
          {stratAI&&<div style={{background:CLR[strat.color][0],borderRadius:9,padding:12,borderLeft:`4px solid ${CLR[strat.color][1]}`}}><div style={{fontSize:12,fontWeight:700,marginBottom:6,color:CLR[strat.color][1]}}>AI Evaluation — {stratN} on {stratT}</div><div style={{fontSize:13,lineHeight:1.9,whiteSpace:"pre-wrap"}}>{stratAI}</div></div>}
          {!stratAI&&!stratAILoad&&<div style={{fontSize:12,color:"#9ca3af",fontStyle:"italic"}}>กด "AI Evaluate" เพื่อวิเคราะห์ว่า {stratN} เหมาะกับ {stratT} ตอนนี้มั้ย</div>}
        </div>
      </div>)}

      {/* ══ EARNINGS ══ */}
      {tab==="earnings"&&(<div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <div style={{fontSize:15,fontWeight:700}}>📅 Earnings Calendar — 45 วันข้างหน้า</div>
          <Bdg c={earnLoad?"gray":"green"} ch={earnLoad?"กำลังโหลด...":"Finnhub Live"}/>
        </div>
        {earnLoad&&<div style={{textAlign:"center",padding:40,color:"#6b7280"}}>กำลังดึงข้อมูลจาก Finnhub...</div>}
        {!earnLoad&&earnings.length===0&&<div style={{padding:20,color:"#6b7280",textAlign:"center"}}>ไม่พบข้อมูล — รีเฟรช tab ใหม่</div>}
        {earnings.length>0&&<div className="card" style={{background:"#fff",borderRadius:12,border:"1px solid #e5e7eb",overflow:"hidden"}}>
          <div style={{display:"grid",gridTemplateColumns:"82px 105px 1fr 85px 90px",gap:5,padding:"7px 14px",fontSize:10,color:"#9ca3af",borderBottom:"1px solid #f3f4f6",fontWeight:700,background:"#f9fafb"}}>
            <span>Ticker</span><span>วันที่</span><span>บริษัท</span><span>EPS est.</span><span>เวลา</span>
          </div>
          {earnings.map((e,i)=>(
            <div key={i} onClick={()=>{setSq(e.symbol);setTab("alpha");setTimeout(()=>inputRef.current?.focus(),100);}}
              style={{display:"grid",gridTemplateColumns:"82px 105px 1fr 85px 90px",gap:5,padding:"9px 14px",borderBottom:"1px solid #f3f4f6",background:i%2===0?"#fff":"#fafafa",alignItems:"center",cursor:"pointer"}} className="card">
              <div style={{fontWeight:700,fontSize:13}}>{e.symbol}</div>
              <div style={{fontSize:12}}>{e.date}</div>
              <div style={{fontSize:11,color:"#9ca3af",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.company||"—"}</div>
              <div style={{fontSize:12,fontWeight:700}}>{e.epsEstimate!=null?`$${e.epsEstimate}`:"—"}</div>
              <Bdg c={e.hour==="bmo"?"blue":e.hour==="amc"?"purple":"gray"} ch={e.hour==="bmo"?"ก่อนเปิด":e.hour==="amc"?"หลังปิด":"TBA"}/>
            </div>
          ))}
        </div>}
      </div>)}

      {/* FOOTER */}
      <div style={{marginTop:20,padding:"10px 14px",background:"#f9fafb",borderRadius:10,border:"1px solid #e5e7eb",fontSize:11,color:"#9ca3af",lineHeight:1.7}}>
        📊 Finnhub Live API · 🤖 Groq AI (Llama3 ฟรี) · IV Rank ประมาณการ ·
        ถ้า Groq CORS ✗ → ย้ายไป <a href="https://netlify.com" target="_blank" style={{color:"#185FA5"}}>Netlify.com</a> (drag & drop ฟรี) · ไม่ใช่คำแนะนำทางการเงิน
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
