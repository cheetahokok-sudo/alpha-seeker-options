<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>⚡ Alpha Seeker Live</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:system-ui,-apple-system,sans-serif;background:#f9fafb;color:#1a1a1a;min-height:100vh;padding:16px}
    input,select,button{font-family:inherit}
    a{color:inherit}
    @media(prefers-color-scheme:dark){
      body{background:#111;color:#f0f0f0}
      .card{background:#1e1e1e!important;border-color:#333!important}
      .inner{background:#2a2a2a!important}
      input{background:#2a2a2a!important;color:#f0f0f0!important;border-color:#444!important}
    }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const {useState,useEffect}=React;

// ── ใส่ API keys ของคุณตรงนี้ ──────────────────────────
const FINNHUB_KEY = "d6rv231r01qgflm163hgd6rv231r01qgflm163i0";
const ANTHROPIC_KEY = ""; // ใส่ Anthropic key ของคุณ: sk-ant-...
// ──────────────────────────────────────────────────────

const TICKERS = [
  "NKE","SOFI","OXY","NVDA","TSLA","AMD","AAPL","META",
  "PLTR","GLD","IBIT","BA","LLY","MRNA","PYPL","GS",
  "XOM","DIS","NFLX","COIN","AMZN","MSFT","JPM","CVX",
  "MSTR","F","SBUX","WMT","ABBV","PFE"
];

const SECTOR = {
  NKE:"Consumer",SOFI:"Fintech",OXY:"Energy",NVDA:"Semis",
  TSLA:"EV",AMD:"Semis",AAPL:"Tech",META:"Tech",PLTR:"AI",
  GLD:"Gold",IBIT:"BTC ETF",BA:"Industrial",LLY:"Pharma",
  MRNA:"Biotech",PYPL:"Fintech",GS:"Finance",XOM:"Energy",
  DIS:"Media",NFLX:"Media",COIN:"Crypto",AMZN:"Tech",
  MSFT:"Tech",JPM:"Finance",CVX:"Energy",MSTR:"Crypto",
  F:"Auto",SBUX:"Consumer",WMT:"Retail",ABBV:"Pharma",PFE:"Pharma"
};

// ── Fetch functions ──────────────────────────────────
async function getQuote(t) {
  try {
    const r = await fetch(`https://finnhub.io/api/v1/quote?symbol=${t}&token=${FINNHUB_KEY}`);
    const d = await r.json();
    if (!d || !d.c || d.c === 0) return null;
    return {
      price: d.c.toFixed(2),
      change: ((d.c - d.pc) / d.pc * 100).toFixed(2),
      high: d.h.toFixed(2),
      low: d.l.toFixed(2),
      prev: d.pc.toFixed(2)
    };
  } catch { return null; }
}

async function getNews(t) {
  try {
    const to = new Date().toISOString().slice(0, 10);
    const from = new Date(Date.now() - 3 * 86400000).toISOString().slice(0, 10);
    const r = await fetch(`https://finnhub.io/api/v1/company-news?symbol=${t}&from=${from}&to=${to}&token=${FINNHUB_KEY}`);
    const d = await r.json();
    if (!Array.isArray(d) || !d.length) return [];
    return d.slice(0, 4).map(n => ({ h: n.headline, src: n.source, url: n.url, dt: new Date(n.datetime * 1000).toLocaleDateString("th-TH") }));
  } catch { return []; }
}

async function getRec(t) {
  try {
    const r = await fetch(`https://finnhub.io/api/v1/stock/recommendation?symbol=${t}&token=${FINNHUB_KEY}`);
    const d = await r.json();
    return Array.isArray(d) && d.length ? d[0] : null;
  } catch { return null; }
}

async function getEarnings() {
  try {
    const from = new Date().toISOString().slice(0, 10);
    const to = new Date(Date.now() + 30 * 86400000).toISOString().slice(0, 10);
    const r = await fetch(`https://finnhub.io/api/v1/calendar/earnings?from=${from}&to=${to}&token=${FINNHUB_KEY}`);
    const d = await r.json();
    return (d.earningsCalendar || []).filter(e => e.symbol && e.date).slice(0, 20);
  } catch { return []; }
}

async function askClaude(prompt) {
  if (!ANTHROPIC_KEY) {
    // Mock response if no API key
    return {
      confidence: Math.floor(Math.random() * 30) + 40,
      signal: "Neutral",
      catalyst: "ไม่มี Anthropic key",
      strategy: "ใส่ ANTHROPIC_KEY ใน code เพื่อเปิดใช้ AI",
      headline: "⚠️ กรุณาใส่ Anthropic API key ใน index.html บรรทัด ANTHROPIC_KEY",
      interesting: false
    };
  }
  try {
    const r = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json", "x-api-key": ANTHROPIC_KEY, "anthropic-version": "2023-06-01" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 250,
        messages: [{ role: "user", content: prompt }]
      })
    });
    const d = await r.json();
    const txt = d.content?.[0]?.text || "{}";
    return JSON.parse(txt.replace(/```json|```/g, "").trim());
  } catch { return null; }
}

// ── UI Components ────────────────────────────────────
function Badge({ color, children }) {
  const map = {
    green: ["#EAF3DE","#3B6D11"], red: ["#FCEBEB","#A32D2D"],
    amber: ["#FAEEDA","#854F0B"], blue: ["#E6F1FB","#185FA5"],
    gray: ["#F1EFE8","#5F5E5A"], teal: ["#E1F5EE","#0F6E56"],
    purple: ["#EEEDFE","#3C3489"]
  };
  const [bg, fg] = map[color] || map.gray;
  return <span style={{ background: bg, color: fg, fontSize: 11, fontWeight: 600, padding: "2px 9px", borderRadius: 6, whiteSpace: "nowrap", display: "inline-block" }}>{children}</span>;
}

function ScoreRing({ score }) {
  if (!score) return <div style={{ width: 52, height: 52, flexShrink: 0 }} />;
  const c = score >= 80 ? "#3B6D11" : score >= 65 ? "#854F0B" : "#A32D2D";
  const R = 22, circ = 2 * Math.PI * R, dash = circ * (score / 100);
  return (
    <div style={{ position: "relative", width: 52, height: 52, flexShrink: 0 }}>
      <svg width={52} height={52} style={{ transform: "rotate(-90deg)" }}>
        <circle cx={26} cy={26} r={R} fill="none" stroke="#e0e0e0" strokeWidth={4} />
        <circle cx={26} cy={26} r={R} fill="none" stroke={c} strokeWidth={4} strokeDasharray={`${dash} ${circ}`} strokeLinecap="round" />
      </svg>
      <div style={{ position: "absolute", inset: 0, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
        <span style={{ fontSize: 13, fontWeight: 700, color: c, lineHeight: 1 }}>{score}</span>
        <span style={{ fontSize: 9, color: c }}>AI</span>
      </div>
    </div>
  );
}

// ── Main App ─────────────────────────────────────────
function App() {
  const [tab, setTab] = useState("alpha");
  const [phase, setPhase] = useState("idle");
  const [progress, setProgress] = useState(0);
  const [currentTicker, setCurrentTicker] = useState("");
  const [picks, setPicks] = useState([]);
  const [open, setOpen] = useState(null);
  const [filter, setFilter] = useState("all");
  const [earnings, setEarnings] = useState([]);
  const [earnLoad, setEarnLoad] = useState(false);
  const [searchTicker, setSearchTicker] = useState("");
  const [searchResult, setSearchResult] = useState(null);
  const [searchNews, setSearchNews] = useState([]);
  const [searchRec, setSearchRec] = useState(null);
  const [searchLoad, setSearchLoad] = useState(false);
  const [lastScan, setLastScan] = useState(null);

  const scan = async () => {
    setPhase("scanning"); setProgress(0); setPicks([]); setOpen(null);
    const found = [];
    for (let i = 0; i < TICKERS.length; i++) {
      const t = TICKERS[i];
      setCurrentTicker(t);
      setProgress(Math.round(((i + 1) / TICKERS.length) * 100));
      try {
        const [q, news, rec] = await Promise.all([getQuote(t), getNews(t), getRec(t)]);
        if (!q) continue;
        const newsText = news.map(n => n.h).join(" | ") || "ไม่มีข่าว";
        const recText = rec ? `StrongBuy:${rec.strongBuy} Buy:${rec.buy} Hold:${rec.hold} Sell:${rec.sell}` : "N/A";
        const result = await askClaude(`Options trader. Analyze ${t} (${SECTOR[t]||"Stock"}):
Price: $${q.price} | Change: ${q.change}%
Analyst: ${recText}
News (3 days): ${newsText}
Reply ONLY JSON no markdown:
{"confidence":number,"signal":"Bullish|Bearish|Neutral","catalyst":"short phrase","strategy":"options strategy","headline":"one sentence why interesting today","interesting":true|false}
interesting=true ONLY if confidence>=65 AND real news catalyst or price move >2%.`);
        if (result && result.interesting) {
          found.push({ t, sec: SECTOR[t] || "Stock", q, news, rec, r: result });
        }
      } catch {}
      if (i < TICKERS.length - 1) await new Promise(res => setTimeout(res, 400));
    }
    found.sort((a, b) => (b.r?.confidence || 0) - (a.r?.confidence || 0));
    setPicks(found);
    setPhase("done");
    setLastScan(new Date());
  };

  const doSearch = async () => {
    const t = searchTicker.trim().toUpperCase();
    if (!t) return;
    setSearchLoad(true); setSearchResult(null); setSearchNews([]); setSearchRec(null);
    const [q, news, rec] = await Promise.all([getQuote(t), getNews(t), getRec(t)]);
    setSearchResult({ ...q, ticker: t }); setSearchNews(news); setSearchRec(rec);
    setSearchLoad(false);
  };

  const loadEarnings = async () => {
    setEarnLoad(true);
    const e = await getEarnings();
    setEarnings(e); setEarnLoad(false);
  };

  useEffect(() => { scan(); }, []);
  useEffect(() => { if (tab === "earnings" && earnings.length === 0) loadEarnings(); }, [tab]);

  const shown = filter === "bullish" ? picks.filter(p => p.r?.signal === "Bullish")
    : filter === "bearish" ? picks.filter(p => p.r?.signal === "Bearish") : picks;
  const today = new Date().toLocaleDateString("th-TH", { weekday: "long", day: "numeric", month: "long", year: "numeric" });

  const TabBtn = ({ id, label }) => (
    <button onClick={() => setTab(id)} style={{
      padding: "9px 16px", fontSize: 13, fontWeight: tab === id ? 700 : 400,
      border: "none", borderBottom: tab === id ? "3px solid #854F0B" : "3px solid transparent",
      background: "none", cursor: "pointer", color: tab === id ? "#854F0B" : "#6b7280", whiteSpace: "nowrap"
    }}>{label}</button>
  );

  return (
    <div style={{ maxWidth: 920, margin: "0 auto" }}>

      {/* HEADER */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 16, flexWrap: "wrap", gap: 8 }}>
        <div>
          <h1 style={{ fontSize: 22, fontWeight: 700, marginBottom: 2 }}>⚡ Alpha Seeker Live</h1>
          <div style={{ fontSize: 12, color: "#6b7280" }}>{today} · ข้อมูลจาก Finnhub · วิเคราะห์โดย Claude AI</div>
        </div>
        <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
          {lastScan && <span style={{ fontSize: 11, color: "#6b7280" }}>สแกนล่าสุด: {lastScan.toLocaleTimeString("th-TH")}</span>}
          <button onClick={scan} disabled={phase === "scanning"}
            style={{ padding: "8px 18px", fontSize: 13, fontWeight: 700, borderRadius: 8, border: "none", background: "#FAEEDA", color: "#854F0B", cursor: phase === "scanning" ? "not-allowed" : "pointer", opacity: phase === "scanning" ? 0.5 : 1 }}>
            {phase === "scanning" ? "กำลังสแกน..." : "🔄 สแกนใหม่"}
          </button>
        </div>
      </div>

      {/* SEARCH BAR */}
      <div style={{ background: "#fff", borderRadius: 12, padding: 16, marginBottom: 16, border: "1px solid #e5e7eb", boxShadow: "0 1px 3px rgba(0,0,0,0.06)" }} className="card">
        <div style={{ fontWeight: 600, marginBottom: 10, fontSize: 14 }}>🔍 ค้นหาหุ้นใดก็ได้ — ราคาจริง + ข่าวจริง + AI วิเคราะห์</div>
        <div style={{ display: "flex", gap: 8 }}>
          <input value={searchTicker} onChange={e => setSearchTicker(e.target.value.toUpperCase())}
            onKeyDown={e => e.key === "Enter" && doSearch()}
            placeholder="พิมพ์ ticker: NKE, SOFI, OXY, AMZN, TSM..."
            style={{ flex: 1, fontSize: 14, padding: "10px 14px", borderRadius: 8, border: "1px solid #d1d5db", background: "#f9fafb", outline: "none" }} />
          <button onClick={doSearch} disabled={searchLoad || !searchTicker.trim()}
            style={{ padding: "10px 20px", fontSize: 13, fontWeight: 700, borderRadius: 8, border: "none", background: "#E6F1FB", color: "#185FA5", cursor: "pointer", opacity: searchLoad || !searchTicker.trim() ? 0.5 : 1 }}>
            {searchLoad ? "กำลังโหลด..." : "ค้นหา →"}
          </button>
        </div>
        {searchResult && (
          <div style={{ marginTop: 14, paddingTop: 14, borderTop: "1px solid #e5e7eb" }}>
            <div style={{ display: "flex", gap: 10, alignItems: "center", flexWrap: "wrap", marginBottom: 10 }}>
              <span style={{ fontSize: 20, fontWeight: 700 }}>{searchResult.ticker}</span>
              <span style={{ fontSize: 22, fontWeight: 700, color: parseFloat(searchResult.change) >= 0 ? "#3B6D11" : "#A32D2D" }}>${searchResult.price}</span>
              <Badge color={parseFloat(searchResult.change) >= 0 ? "green" : "red"}>{parseFloat(searchResult.change) >= 0 ? "+" : ""}{searchResult.change}%</Badge>
              <Badge color="green">Finnhub Live</Badge>
              <button onClick={() => setSearchResult(null)} style={{ marginLeft: "auto", fontSize: 12, padding: "4px 10px", borderRadius: 8, border: "1px solid #e5e7eb", background: "none", cursor: "pointer", color: "#6b7280" }}>✕ ปิด</button>
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 8, marginBottom: 10 }}>
              {[["สูงสุดวันนี้", `$${searchResult.high}`], ["ต่ำสุดวันนี้", `$${searchResult.low}`], ["ปิดเมื่อวาน", `$${searchResult.prev}`]].map(([l, v]) => (
                <div key={l} style={{ background: "#f9fafb", borderRadius: 8, padding: "8px 12px" }} className="inner">
                  <div style={{ fontSize: 10, color: "#6b7280", marginBottom: 2 }}>{l}</div>
                  <div style={{ fontSize: 15, fontWeight: 700 }}>{v}</div>
                </div>
              ))}
            </div>
            {searchRec && (
              <div style={{ marginBottom: 10, padding: "10px 12px", background: "#f9fafb", borderRadius: 8 }} className="inner">
                <div style={{ fontSize: 11, fontWeight: 600, marginBottom: 6, color: "#6b7280" }}>Analyst Consensus — Finnhub Real ({searchRec.period})</div>
                <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                  <Badge color="teal">StrongBuy: {searchRec.strongBuy}</Badge>
                  <Badge color="green">Buy: {searchRec.buy}</Badge>
                  <Badge color="gray">Hold: {searchRec.hold}</Badge>
                  <Badge color="red">Sell: {searchRec.sell}</Badge>
                </div>
              </div>
            )}
            {searchNews.length > 0 && (
              <div>
                <div style={{ fontSize: 11, fontWeight: 600, marginBottom: 6, color: "#6b7280" }}>ข่าวล่าสุด — Finnhub</div>
                {searchNews.slice(0, 4).map((n, i) => (
                  <a key={i} href={n.url} target="_blank" rel="noreferrer" style={{ display: "block", padding: "7px 0", textDecoration: "none", borderBottom: i < 3 ? "1px solid #f3f4f6" : "none" }}>
                    <div style={{ fontSize: 13, fontWeight: 500, color: "#1a1a1a", marginBottom: 2 }}>{n.h}</div>
                    <div style={{ fontSize: 11, color: "#6b7280" }}>{n.src} · {n.dt}</div>
                  </a>
                ))}
              </div>
            )}
          </div>
        )}
      </div>

      {/* TABS */}
      <div style={{ display: "flex", borderBottom: "1px solid #e5e7eb", marginBottom: 18, overflowX: "auto" }}>
        <TabBtn id="alpha" label="⚡ Alpha Seeker" />
        <TabBtn id="earnings" label="📅 Earnings" />
        <TabBtn id="news" label="📰 News" />
      </div>

      {/* ── ALPHA TAB ── */}
      {tab === "alpha" && (
        <div>
          {/* Progress */}
          {phase === "scanning" && (
            <div style={{ background: "#FAEEDA", borderRadius: 10, padding: "16px 18px", marginBottom: 16 }}>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
                <span style={{ fontSize: 13, fontWeight: 600, color: "#854F0B" }}>Claude กำลังวิเคราะห์ {currentTicker}... ({Math.round(progress / 100 * TICKERS.length)}/{TICKERS.length})</span>
                <span style={{ fontSize: 14, fontWeight: 700, color: "#854F0B" }}>{progress}%</span>
              </div>
              <div style={{ height: 10, background: "#F5E6C8", borderRadius: 5, overflow: "hidden" }}>
                <div style={{ width: `${progress}%`, height: "100%", background: "#854F0B", borderRadius: 5, transition: "width 0.4s" }} />
              </div>
              <div style={{ fontSize: 11, color: "#854F0B", marginTop: 6 }}>ดึงข่าว Finnhub 3 วัน → Claude อ่านข่าวจริง → คัดเฉพาะที่มี catalyst</div>
            </div>
          )}

          {/* Filter */}
          {phase === "done" && (
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12, flexWrap: "wrap", gap: 8 }}>
              <div style={{ fontSize: 13, color: "#6b7280" }}>
                พบ <strong style={{ color: "#1a1a1a" }}>{picks.length} โอกาส</strong> จาก {TICKERS.length} tickers วันนี้
              </div>
              <div style={{ display: "flex", gap: 5 }}>
                {[["all", "ทั้งหมด"], ["bullish", "🟢 Bullish"], ["bearish", "🔴 Bearish"]].map(([v, l]) => (
                  <button key={v} onClick={() => setFilter(v)} style={{ fontSize: 11, padding: "4px 12px", borderRadius: 20, border: "1px solid #e5e7eb", cursor: "pointer", background: filter === v ? "#FAEEDA" : "#f9fafb", color: filter === v ? "#854F0B" : "#6b7280", fontWeight: filter === v ? 700 : 400 }}>{l}</button>
                ))}
              </div>
            </div>
          )}

          {/* No results */}
          {phase === "done" && picks.length === 0 && (
            <div style={{ textAlign: "center", padding: 50, background: "#fff", borderRadius: 12, border: "1px solid #e5e7eb" }} className="card">
              <div style={{ fontSize: 40, marginBottom: 12 }}>🔍</div>
              <div style={{ fontSize: 15, fontWeight: 700, marginBottom: 6 }}>ไม่พบ catalyst น่าสนใจวันนี้</div>
              <div style={{ fontSize: 13, color: "#6b7280", marginBottom: 16 }}>ตลาดเงียบ หรือ Finnhub rate limit — รอ 1 นาทีแล้วสแกนใหม่</div>
              <button onClick={scan} style={{ padding: "10px 24px", fontSize: 14, fontWeight: 700, borderRadius: 8, border: "none", background: "#FAEEDA", color: "#854F0B", cursor: "pointer" }}>🔄 สแกนใหม่</button>
            </div>
          )}

          {/* Pick cards */}
          {shown.map((item, idx) => {
            const { t, sec, q, news, rec, r } = item;
            const isOpen = open === t;
            const pos = parseFloat(q.change) >= 0;
            const sigC = r.signal === "Bullish" ? "green" : r.signal === "Bearish" ? "red" : "gray";
            return (
              <div key={t} className="card" style={{ border: "1px solid #e5e7eb", borderRadius: 12, marginBottom: 10, overflow: "hidden", background: "#fff", boxShadow: "0 1px 3px rgba(0,0,0,0.06)" }}>
                <div onClick={() => setOpen(isOpen ? null : t)} style={{ padding: "14px 16px", cursor: "pointer", display: "flex", gap: 12, alignItems: "flex-start" }}>
                  <ScoreRing score={r.confidence} />
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ display: "flex", gap: 6, alignItems: "center", flexWrap: "wrap", marginBottom: 6 }}>
                      <span style={{ fontWeight: 700, fontSize: 16 }}>{t}</span>
                      <Badge color="gray">{sec}</Badge>
                      <Badge color={sigC}>{r.signal}</Badge>
                      {idx === 0 && <Badge color="amber">🏆 Top Pick วันนี้</Badge>}
                    </div>
                    <div style={{ fontSize: 13, lineHeight: 1.6, fontWeight: 500, marginBottom: 6 }}>{r.headline}</div>
                    <div style={{ display: "flex", gap: 6, marginBottom: 6, flexWrap: "wrap" }}>
                      <Badge color="purple">📌 {r.catalyst}</Badge>
                      <Badge color="blue">💡 {r.strategy}</Badge>
                    </div>
                    <div style={{ display: "flex", gap: 16, flexWrap: "wrap" }}>
                      <span style={{ fontSize: 13 }}>ราคา <strong style={{ color: pos ? "#3B6D11" : "#A32D2D" }}>${q.price} ({pos ? "+" : ""}{q.change}%)</strong></span>
                      {rec && <span style={{ fontSize: 12, color: "#6b7280" }}>Buy:{rec.buy} Hold:{rec.hold} Sell:{rec.sell}</span>}
                    </div>
                  </div>
                  <span style={{ fontSize: 20, color: "#9ca3af", flexShrink: 0 }}>{isOpen ? "▲" : "▼"}</span>
                </div>

                {isOpen && (
                  <div className="inner" style={{ borderTop: "1px solid #f3f4f6", padding: "14px 16px", background: "#f9fafb" }}>
                    <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 8, marginBottom: 12 }}>
                      {[["ราคา", `$${q.price}`], ["High", `$${q.high}`], ["Low", `$${q.low}`]].map(([l, v]) => (
                        <div key={l} style={{ background: "#fff", borderRadius: 8, padding: "8px 12px", border: "1px solid #e5e7eb" }}>
                          <div style={{ fontSize: 10, color: "#9ca3af", marginBottom: 2 }}>{l}</div>
                          <div style={{ fontSize: 15, fontWeight: 700 }}>{v}</div>
                        </div>
                      ))}
                    </div>
                    {rec && (
                      <div style={{ marginBottom: 12, padding: "10px 12px", background: "#fff", borderRadius: 8, border: "1px solid #e5e7eb" }}>
                        <div style={{ fontSize: 11, fontWeight: 600, marginBottom: 6, color: "#6b7280" }}>Analyst Consensus — Finnhub Real ({rec.period})</div>
                        <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                          <Badge color="teal">StrongBuy: {rec.strongBuy}</Badge>
                          <Badge color="green">Buy: {rec.buy}</Badge>
                          <Badge color="gray">Hold: {rec.hold}</Badge>
                          <Badge color="red">Sell: {rec.sell}</Badge>
                        </div>
                      </div>
                    )}
                    <div style={{ marginBottom: 12, padding: "12px 14px", background: r.signal === "Bullish" ? "#EAF3DE" : r.signal === "Bearish" ? "#FCEBEB" : "#F1EFE8", borderRadius: 8, borderLeft: `4px solid ${r.signal === "Bullish" ? "#639922" : r.signal === "Bearish" ? "#E24B4A" : "#888"}` }}>
                      <div style={{ fontSize: 12, fontWeight: 700, marginBottom: 4, color: r.signal === "Bullish" ? "#3B6D11" : r.signal === "Bearish" ? "#A32D2D" : "#5F5E5A" }}>
                        AI Strategy — Confidence {r.confidence}/100 · {r.confidence >= 80 ? "🟢 สัญญาณแข็ง" : r.confidence >= 65 ? "🟡 ปานกลาง" : "🔴 อ่อน"}
                      </div>
                      <div style={{ fontSize: 14, fontWeight: 600 }}>{r.strategy}</div>
                    </div>
                    {news.length > 0 && (
                      <div>
                        <div style={{ fontSize: 11, fontWeight: 700, marginBottom: 6, color: "#6b7280" }}>📰 ข่าวที่ Claude ใช้วิเคราะห์ (Finnhub Real)</div>
                        {news.map((n, i) => (
                          <a key={i} href={n.url} target="_blank" rel="noreferrer" style={{ display: "block", padding: "7px 0", textDecoration: "none", borderBottom: i < news.length - 1 ? "1px solid #f3f4f6" : "none" }}>
                            <div style={{ fontSize: 13, fontWeight: 500, color: "#1a1a1a", marginBottom: 1 }}>{n.h}</div>
                            <div style={{ fontSize: 11, color: "#9ca3af" }}>{n.src} · {n.dt}</div>
                          </a>
                        ))}
                      </div>
                    )}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}

      {/* ── EARNINGS TAB ── */}
      {tab === "earnings" && (
        <div>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
            <div style={{ fontSize: 14, fontWeight: 700 }}>📅 Earnings Calendar — 30 วันข้างหน้า</div>
            <Badge color={earnLoad ? "gray" : "green"}>{earnLoad ? "กำลังโหลด..." : "Finnhub Live"}</Badge>
          </div>
          {earnLoad && <div style={{ textAlign: "center", padding: 30, color: "#6b7280" }}>กำลังดึงข้อมูลจาก Finnhub...</div>}
          {!earnLoad && earnings.length === 0 && <div style={{ padding: 20, color: "#6b7280", textAlign: "center" }}>ไม่พบข้อมูล — Finnhub อาจ rate limit รอ 60 วินาทีแล้วรีเฟรช</div>}
          {earnings.length > 0 && (
            <div style={{ background: "#fff", borderRadius: 12, border: "1px solid #e5e7eb", overflow: "hidden" }} className="card">
              <div style={{ display: "grid", gridTemplateColumns: "80px 100px 1fr 80px 90px", gap: 5, padding: "8px 14px", fontSize: 10, color: "#9ca3af", borderBottom: "1px solid #f3f4f6", fontWeight: 700, background: "#f9fafb" }}>
                <span>Ticker</span><span>วันที่</span><span>บริษัท</span><span>EPS est.</span><span>เวลา</span>
              </div>
              {earnings.map((e, i) => (
                <div key={i} style={{ display: "grid", gridTemplateColumns: "80px 100px 1fr 80px 90px", gap: 5, padding: "9px 14px", borderBottom: "1px solid #f3f4f6", alignItems: "center", background: i % 2 === 0 ? "#fff" : "#fafafa" }}>
                  <div style={{ fontWeight: 700, fontSize: 13 }}>{e.symbol}</div>
                  <div style={{ fontSize: 12 }}>{e.date}</div>
                  <div style={{ fontSize: 11, color: "#6b7280", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{e.company || "—"}</div>
                  <div style={{ fontSize: 12, fontWeight: 600 }}>{e.epsEstimate != null ? `$${e.epsEstimate}` : "—"}</div>
                  <Badge color={e.hour === "bmo" ? "blue" : e.hour === "amc" ? "purple" : "gray"}>{e.hour === "bmo" ? "ก่อนเปิด" : e.hour === "amc" ? "หลังปิด" : "TBA"}</Badge>
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {/* ── NEWS TAB ── */}
      {tab === "news" && (
        <div>
          <div style={{ fontSize: 13, color: "#6b7280", marginBottom: 14 }}>คลิก ticker เพื่อดูข่าวล่าสุดจาก Finnhub หรือค้นหาด้านบน</div>
          <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
            {TICKERS.slice(0, 20).map(t => (
              <button key={t} onClick={async () => {
                setSearchTicker(t);
                const [q, news, rec] = await Promise.all([getQuote(t), getNews(t), getRec(t)]);
                setSearchResult({ ...q, ticker: t }); setSearchNews(news); setSearchRec(rec);
                setTab("alpha"); window.scrollTo({ top: 0, behavior: "smooth" });
              }} style={{ fontSize: 12, padding: "5px 13px", borderRadius: 20, border: "1px solid #e5e7eb", cursor: "pointer", background: "#f9fafb", fontWeight: 500 }}>
                {t}
              </button>
            ))}
          </div>
        </div>
      )}

      {/* FOOTER */}
      <div style={{ marginTop: 20, padding: "10px 14px", background: "#f9fafb", borderRadius: 10, border: "1px solid #e5e7eb", fontSize: 11, color: "#9ca3af", lineHeight: 1.6 }}>
        ราคา + ข่าว + Earnings + Analyst: Finnhub Live API · AI วิเคราะห์: Claude (Anthropic) · กด "สแกนใหม่" ทุกวันเพื่ออัปเดต · ไม่ใช่คำแนะนำทางการเงิน
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
